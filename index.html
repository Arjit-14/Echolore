<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARKANA — Indian Cultural Heritage Platform</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <!-- Tailwind CDN with forms and container queries -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <!-- Tailwind Configuration -->
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary": "#5f5e5e",
              "on-surface-variant": "#4e4637",
              "primary": "#6f5100",
              "surface-bright": "#fbf9f5",
              "surface-container-low": "#f5f3ef",
              "primary-fixed-dim": "#ecc165",
              "surface-dim": "#dbdad6",
              "outline-variant": "#d1c5b2",
              "on-surface": "#1b1c1a",
              "outline": "#807665",
              "background": "#fbf9f5",
              "surface-container-highest": "#e4e2de",
              "secondary-container": "#e2dfde",
              "on-primary": "#ffffff",
              "surface-container": "#efeeea",
              "on-background": "#1b1c1a",
              "inverse-surface": "#30312e",
              "secondary-fixed": "#e5e2e1",
              "secondary-fixed-dim": "#c8c6c5",
              "primary-container": "#8b6914",
              "on-primary-container": "#fff0da",
              "primary-fixed": "#ffdfa0",
              "surface": "#fbf9f5",
              "surface-container-high": "#eae8e4",
              "inverse-primary": "#ecc165",
              "surface-container-lowest": "#ffffff",
              "surface-variant": "#e4e2de",
            },
            spacing: {
              "gutter": "24px",
              "desktop_padding": "80px",
              "section_v_spacing": "120px",
              "max_width": "1280px",
              "mobile_padding": "20px",
              "tablet_padding": "40px"
            },
            fontFamily: {
              "body-lg": ["Inter"],
              "label-sm": ["Inter"],
              "section-label": ["Playfair Display"],
              "display-lg-mobile": ["Playfair Display"],
              "headline-md": ["Playfair Display"],
              "display-lg": ["Playfair Display"],
              "body-md": ["Inter"]
            },
            fontSize: {
              "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
              "label-sm": ["12px", {"lineHeight": "1.4", "letterSpacing": "0.02em", "fontWeight": "500"}],
              "section-label": ["14px", {"lineHeight": "1", "letterSpacing": "0.12em", "fontWeight": "500"}],
              "display-lg-mobile": ["40px", {"lineHeight": "1.2", "fontWeight": "600"}],
              "headline-md": ["32px", {"lineHeight": "1.3", "fontWeight": "500"}],
              "display-lg": ["64px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
              "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-background text-on-surface font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
